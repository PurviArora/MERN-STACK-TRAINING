<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMS</title>
    <link rel="stylesheet" href="assests/form.css">
        
</head>
<body>
     <form action="" align="center" >
        <table border="10" width="50%" align="center" cellspacing="35">
        <tr>
            <th>
                <label for="fname">First Name</label>
            </th>
            <td>
                <input type="text" id="fname" placeholder="your first name">
            </td>
        </tr>
        <tr>
            <th>
                <label for="lname">Last Name</label>
            </th>
            <td>
                <input type="text" id="lname" placeholder="your last name">
            </td>
        </tr>
        <tr>
            <th>
                <label for="email">Email</label>
            </th>
            <td>
                <input type="text" id="email" placeholder="your email id">
            </td>
        </tr>
        <tr>
            <th>
                <label for="pass">Password</label>
            </th>
            <td>
                <input type="text" id="pass" placeholder="your password">
            </td>
        </tr>
        <tr>
            <th>
                <label for="gender">Gender</label>
            </th>
            <td>
                <label for="">Male</label>
                <input type="radio" value="male" name="g1">
                <label for="">Female</label>
                <input type="radio" value="female" name="g1" >
            </td>
        </tr>
        <tr>
            <th>
                <label for="qualification">Highest Education</label>
            </th>
            <td>
                <label for="">Class X</label>
                <input type="radio" value="class X" name="q1">
                <label for="">Class XII</label>
                <input type="radio" value="class XII" name="q1">
                <label for="">Undergraduate</label>
                <input type="radio" value="under-grad" name="q1">
                <label for="">Graduate</label>
                <input type="radio" value="grad" name="q1">
            </td>
        </tr>
        <tr>
            <th>
                <label for="skills">Skills</label>
            </th>
            <td>
                <label for="">C/C++</label>
                <input type="checkbox" name="skills">
                <label for="">PYTHON</label>
                <input type="checkbox" name="skills">
                <label for="">HTML</label>
                <input type="checkbox" name="skills">
                <label for="">CSS</label>
                <input type="checkbox" name="skills">
                <label for="">JS</label>
                <input type="checkbox" name="skills">
                <label for="">REACT</label>
                <input type="checkbox" name="skills">
                <label for="">MERN</label>
                <input type="checkbox" name="skills">
            </td>
        </tr>
        <tr>
            <th>
                <label for="">City</label>
            </th>
            <td>
                <select name="" id="">
                    <option value="">Select City</option>
                    <option value="">Delhi</option>
                    <option value="">Noida</option>
                    <option value="">Gurugram</option>
                    <option value="">Mumbai</option>
                </select>
            </td>
        </tr>
        <tr>
            <th>
                <label for="">DOB</label>
            </th>
            <td>
                <input type="date" name="" id="">
            </td>
        </tr>
        <tr>
            <th>
                <label for="">Range</label>
            </th>
            <td>
                <input type="range" name="" id="">
            </td>
        </tr>
        <tr>
            <td><input type="submit" name="" id=""></td>
            <td><input type="reset" name="" id=""></td>
        </tr>
        </table>
     </form>
</body>
</html>
